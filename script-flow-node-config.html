      <span className="ic" style={{background:meta.color}}>{meta.ic}</span>
      <b>{meta.l}</b>
      {detail && <span className="det" style={{marginLeft:"auto",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{detail}</span>}
    </div>
  );
}
function PropsEditor({props, setProps}){
  const up=(i,patch)=>setProps(props.map((p,j)=>j===i?{...p,...patch}:p));
  return (
    <>
      {props.map((p,i)=>(
        <div className="prop" key={i}>
          <div className="prop-top">
            <input className="tin mono pname" placeholder="property_name" value={p.name} onChange={e=>up(i,{name:e.target.value})} />
            <select className="tin" value={p.type} onChange={e=>up(i,{type:e.target.value})}>
              {PROP_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <span className="x" onClick={()=>setProps(props.filter((_,j)=>j!==i))}>{Icon.x}</span>
          </div>
          <input className="tin" placeholder="description — what this parameter is for" value={p.description} onChange={e=>up(i,{description:e.target.value})} />
        </div>
      ))}
      <button className="add-row" onClick={()=>setProps([...props,{name:"",type:"string",description:""}])}>{Icon.plus} Add property</button>
    </>
  );
}

function ToolCard({tool, onDelete}){
  if(tool.kind==="llm"){
    const acts = tool.actions||[];
    const props = tool.properties||[];
    return (
      <div className="tool">
        <div className="tool-top">
          <span className="tool-ic llm">{Icon.bolt}</span>
          <div style={{flex:1,minWidth:0}}>
            <div className="tool-name">{tool.tool_name||"unnamed_tool"}</div>
            <div className="tool-meta">LLM-triggered function{props.length>0?` · ${props.length} param${props.length!==1?"s":""}`:""}{acts.length>0?` · ${acts.length} action${acts.length!==1?"s":""}`:""}</div>
          </div>
          <button className="btn icon ghost sm" onClick={onDelete}>{Icon.trash}</button>
        </div>
        {tool.description && <div className="tool-desc">{tool.description}</div>}
        {props.length>0 && <div className="tool-props">{props.map((p,i)=>(
          <div className="tprop" key={i}><b>{p.name||"param"}</b><span className="ty">{p.type}</span><span className="pd">{p.description}</span></div>
        ))}</div>}
        {acts.length>0 && <div className="action-list">{acts.map((a,i)=><ActionRow a={a} key={i} />)}</div>}
      </div>
    );
  }
  const tm = TIMINGS.find(x=>x.v===tool.timing) || {};
  return (
    <div className="tool">
      <div className="tool-top">
        <span className="tool-ic timing">{Icon.clock}</span>
        <div style={{flex:1,minWidth:0}}>
          <div className="tool-name" style={{fontFamily:"Inter"}}>{tm.l}</div>
          <div className="tool-meta">Timing-triggered · {tool.actions.length} action{tool.actions.length!==1?"s":""}</div>
        </div>
        <button className="btn icon ghost sm" onClick={onDelete}>{Icon.trash}</button>
      </div>
      <div className="action-list">
        {tool.actions.length===0 && <div className="empty">No actions</div>}
        {tool.actions.map((a,i)=><ActionRow a={a} key={i} />)}
      </div>
    </div>
  );
}

/* ============================= ADD TOOL MODAL ============================= */
function AddToolModal({onAdd, onClose, goalNames}){
  const [tab,setTab]=useState("llm");
  // llm
  const [name,setName]=useState(""); const [desc,setDesc]=useState("");
  const [llmProps,setLlmProps]=useState([]);
  const [llmActions,setLlmActions]=useState([]);
  // timing
  const [timing,setTiming]=useState("completed");
  const [actions,setActions]=useState([]);

  const save = () => {
    if(tab==="llm") onAdd({kind:"llm", tool_name:name.trim()||"new_tool", description:desc.trim(), properties:llmProps, actions:llmActions});
    else onAdd({kind:"timing", timing, actions});
  };

  return (
    <div className="overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-title">Add tool</div>
          <div className="modal-sub">Choose how this tool is invoked during the turn.</div>
        </div>
        <div className="tabs">
          <button className={"tab"+(tab==="llm"?" on":"")} onClick={()=>setTab("llm")}>
            <div className="tt"><span style={{color:"var(--ask)"}}>{Icon.bolt}</span> LLM triggered</div>
            <div className="td">The model decides when to call it, based on a name &amp; description.</div>
          </button>
          <button className={"tab"+(tab==="timing"?" on":"")} onClick={()=>setTab("timing")}>
            <div className="tt"><span style={{color:"var(--say)"}}>{Icon.clock}</span> Timing triggered</div>
            <div className="td">Fulfillment actions that fire at a fixed point of the goal flow.</div>
          </button>
        </div>

        <div className="modal-body">
          {tab==="llm" ? (
            <>
              <Field label="Tool name" desc="The function name the model calls. Use snake_case, no spaces."
                json={`"options": { "llm_tools": [{ "tool_name": ${JSON.stringify(name||"lookup_account")} }] }`}>
                <input className="tin mono" placeholder="lookup_account" value={name} onChange={e=>setName(e.target.value)} />
              </Field>
              <Field label="Description" desc="Tells the model what the tool does and when to use it. This drives the model's decision to call it."
                json={`"description": ${JSON.stringify(desc||"<when to use this tool>")}`}>
                <textarea className="tin" rows={4} placeholder="Explain to the model what this tool does and when to use it…"
                  value={desc} onChange={e=>setDesc(e.target.value)} />
                <div className="help">The LLM uses this to decide whether and when to trigger the tool.</div>
              </Field>
              <Field label="Properties"
                extra={<span style={{color:"var(--muted)",fontWeight:500,textTransform:"none",letterSpacing:0}}> · parameters</span>}
                desc="Input parameters the model fills when calling this tool — one per line, each with a name, type and description."
                json={`"properties": { ${llmProps.filter(p=>p.name).map(p=>`${JSON.stringify(p.name)}: { "type": ${JSON.stringify(p.type)}, "description": ${JSON.stringify(p.description)} }`).join(", ")} }`}>
                <PropsEditor props={llmProps} setProps={setLlmProps} />
              </Field>
              <div className="hr"/>
              <Field label="Actions when invoked"
                extra={<span style={{color:"var(--muted)",fontWeight:500,textTransform:"none",letterSpacing:0}}> · optional</span>}
                desc="Fulfillment actions that run when the model invokes this tool (set values, webhook, etc.). Optional."
                style={{marginBottom:0}}>
                <ActionsEditor actions={llmActions} setActions={setLlmActions} goalNames={goalNames} />
              </Field>
            </>
          ) : (
            <>
              <Field label={<>{Icon.clock} Timing</>} desc="When in the goal's life-cycle these actions fire."
                json={`"fulfillment": [{ "timing": ${JSON.stringify(timing)} }]`}>
                <select value={timing} onChange={e=>setTiming(e.target.value)}>
                  {TIMINGS.map(t=><option key={t.v} value={t.v}>{t.l} — {t.d}</option>)}
                </select>
              </Field>
              <Field label="Fulfillment actions" desc="Actions performed at the selected timing — set values, contact state, webhook, SMS, trigger another goal, voice control.">
                <ActionsEditor actions={actions} setActions={setActions} goalNames={goalNames} />
              </Field>
            </>
          )}
        </div>

        <div className="modal-foot">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={()=>{save();onClose();}}>Add tool</button>
        </div>
      </div>
    </div>
  );
}

/* ============================= TRANSITION ============================= */
function TransitionCard({tr, onChange, onDelete, goalNames}){
  const up = patch => onChange({...tr, ...patch});
  return (
    <div className="tcard">
      <div className="trans-head">
        <span className="trans-ic">{Icon.arrow}</span>
        <Tooltip label={`"name": ${JSON.stringify(tr.name||"<transition name>")}`} mono>
          <input className="trans-name" placeholder="Transition name" value={tr.name} onChange={e=>up({name:e.target.value})} />
        </Tooltip>
        <Menu trigger={<Tooltip label={`"target": ${JSON.stringify(tr.target||"<target goal>")}`} mono><span className="trans-target">{Icon.arrow} {tr.target||"target"}</span></Tooltip>}>
          {close=>(<div style={{maxHeight:360,overflow:"auto"}}>
            <div className="menu-sec">This script</div>
            {goalNames.length===0 && <div className="empty">No other goals</div>}
            {goalNames.map(g=><MItem key={g} icon={Icon.say} label={g} active={tr.target===g} onClick={()=>{up({target:g});close();}} />)}
            <div className="menu-sec">Built-in goals</div>
            {BUILTIN_GOALS.map(g=><MItem key={g} icon={Icon.star} label={g} active={tr.target===g} onClick={()=>{up({target:g});close();}} />)}
            <div className="hr" style={{margin:"6px 4px"}}/>
            <MItem icon={Icon.plus} label="New goal…" onClick={()=>{up({target:tr.name||"new goal"});close();}} />
          </div>)}
        </Menu>
        <button className="btn icon ghost sm" onClick={onDelete}>{Icon.trash}</button>
      </div>
      <div className="trans-body">
        <Field label="Prompt" desc="Natural-language instruction describing when to activate this transition."
          json={`"prompt": ${JSON.stringify(tr.prompt||"activate this transition when the user requests to order a product")}`}>
          <textarea className="tin" rows={2} placeholder="e.g.  activate this transition when the user requests to order a product"
            value={tr.prompt} onChange={e=>up({prompt:e.target.value})} />
        </Field>
        <Field label="Conditions" extra={<span style={{color:"var(--muted)",fontWeight:500,textTransform:"none",letterSpacing:0}}> · optional</span>}
          desc="Logical condition that must hold for this transition to be eligible."
          json={`"conditions": ${JSON.stringify(tr.conditions||"a = b")}`}>
          <input className="tin mono" placeholder="e.g.  status = active and score > 5"
            value={tr.conditions} onChange={e=>up({conditions:e.target.value})} />
        </Field>
        <Field label="Extracted properties"
          desc="Values to extract from the user message — one per line, each with a name, type and description."
          json={`"properties": { ${tr.properties.filter(p=>p.name).map(p=>`${JSON.stringify(p.name)}: { "type": ${JSON.stringify(p.type)}, "description": ${JSON.stringify(p.description)} }`).join(", ")} }`}>
          <PropsEditor props={tr.properties} setProps={p=>up({properties:p})} />
        </Field>
        <Field label="Assigned values" style={{marginBottom:0}}
          desc="Fixed values written to conversation memory when this transition runs."
          json={`"values": { ${tr.assigned.filter(kv=>kv.k).map(kv=>`${JSON.stringify(kv.k)}: ${JSON.stringify(kv.v)}`).join(", ")} }`}>
          {tr.assigned.map((kv,i)=>(
            <div className="kv" key={i}>
              <input className="tin mono" placeholder="field" value={kv.k} onChange={e=>up({assigned:tr.assigned.map((x,j)=>j===i?{...x,k:e.target.value}:x)})} />
              <span className="arrow">{Icon.arrow}</span>
              <input className="tin mono" placeholder="value" value={kv.v} onChange={e=>up({assigned:tr.assigned.map((x,j)=>j===i?{...x,v:e.target.value}:x)})} />
              <span className="x" onClick={()=>up({assigned:tr.assigned.filter((_,j)=>j!==i)})}>{Icon.x}</span>
            </div>
          ))}
          <span className="sub-add" onClick={()=>up({assigned:[...tr.assigned,{k:"",v:""}]})}>{Icon.plus} add assigned value</span>
        </Field>
      </div>
    </div>
  );
}

/* ============================= NODE EDITOR (right panel) ============================= */
function NodeEditor({node, onChange, onDelete, allGoalNames, onAddChild, onSelect}){
  const up = patch => onChange({...node, ...patch});
  const upAdv = patch => up({adv:{...node.adv, ...patch}});
  const upObj = patch => up({objection:{...node.objection, ...patch}});
  const upRef = patch => up({refusal:{...node.refusal, ...patch}});
  const upTrig = patch => up({triggers:{...node.triggers, ...patch}});
  const upVal = patch => up({value:{...node.value, ...patch}});
  const toggleSec = k => up({open:{...node.open, [k]:!node.open[k]}});
  const [addingTool,setAddingTool]=useState(false);

  const isAsk = node.type==="ask";
  const vt = node.value.type;
  const showValueSection = isAsk;   // choices apply to every value type, so always show for ask goals
  const otherGoals = allGoalNames.filter(g=>g && g!==node.name);
  const ackJson = node.acknowledge==="off" ? '"acknowledge": false'
                : node.acknowledge==="custom" ? `"acknowledge": ${JSON.stringify(node.ackText||"Great, thanks!")}`
                : '// acknowledge: auto-generated';

  const advBadges = [];
  if(node.adv.repeat) advBadges.push(<span className="badge accent" key="r">{Icon.repeat} repeat</span>);
  if(!node.adv.proactive) advBadges.push(<span className="badge" key="p">reactive only</span>);
  if(node.triggers.enabled) advBadges.push(<span className="badge" key="t" style={{background:"var(--say-soft)",color:"var(--say)",borderColor:"transparent"}}>{Icon.bolt} triggers</span>);
  if(node.objection.enabled) advBadges.push(<span className="badge" key="o" style={{background:"var(--red-soft)",color:"var(--red)",borderColor:"transparent"}}>{Icon.shield} objections</span>);
  if(node.refusal.enabled) advBadges.push(<span className="badge amber" key="rf">{Icon.flag} refusal</span>);
  if(node.childGoals) advBadges.push(<span className="badge accent" key="cg">{Icon.folder} sub-goals</span>);

  const fulfillment = node.tools.filter(t=>t.kind==="timing");
  const llm = node.tools.filter(t=>t.kind==="llm");

  return (
    <div className="node-editor">
      {/* HEAD */}
      <div className="node-head">
        <div className="node-head-row">
          <div className="typetog">
            <button data-t="say" title='"goal_type":"say"' className={!isAsk?"on":""} onClick={()=>up({type:"say"})}>{Icon.say} Say</button>
            <button data-t="ask" title='"goal_type":"ask"' className={isAsk?"on":""}
              onClick={()=>up({type:"ask", value:{...node.value, choices:choicesForType(node.value.choices, node.value.type)}})}>{Icon.ask} Ask</button>
            <button data-t="group" title="Convert to a group container" onClick={()=>onChange(convertNode(node,"group"))}>{Icon.folder} Group</button>
          </div>
          {isAsk && (
            <div className="typetog">
              <Tooltip label={`"value_type": ${JSON.stringify(vt)}`} mono>
                <select className="vtype" value={vt}
                  onChange={e=>upVal({type:e.target.value, choices:choicesForType(node.value.choices, e.target.value)})}>
                  {VALUE_TYPES.map(v=><option key={v} value={v}>{v}</option>)}
                </select>
              </Tooltip>
            </div>
          )}
          <div style={{flex:1}}/>
          <Menu trigger={<button className="btn icon ghost">{Icon.dots}</button>}>
            {close=>(<>
              <div className="menu-sec">Add</div>
              <MItem icon={Icon.cond} label={node.condition!==null?"Edit condition":"Add condition"}
                onClick={()=>{ up({condition:node.condition??""}); close(); }} />
              <MItem icon={Icon.folder} label="Child goals" toggle={node.childGoals}
                desc="Let this goal contain sub-goals (serialized as its 'goals')."
                tip='"goals": [ … ]' onClick={()=>up({childGoals:!node.childGoals})} />
              <div className="menu-sec">Advanced behavior</div>
              <MItem icon={Icon.bolt}   label="Triggers"           toggle={node.triggers.enabled}  tip='"triggers": ["..."], "negative_triggers": ["..."]' onClick={()=>upTrig({enabled:!node.triggers.enabled})} />
              <MItem icon={Icon.repeat} label="Repeat goal"       toggle={node.adv.repeat}    tip='"repeat": true'     onClick={()=>upAdv({repeat:!node.adv.repeat})} />
              <MItem icon={Icon.bolt}   label="Proactive"          toggle={node.adv.proactive} tip='"proactive": false' onClick={()=>upAdv({proactive:!node.adv.proactive})} />
              {isAsk && <MItem icon={Icon.collect} label="Passive detection" toggle={node.value.passive}
                desc="Capture this value even if the user volunteers it without being asked. On by default."
                tip='"qualifier_blocks_passive_detection": true' onClick={()=>upVal({passive:!node.value.passive})} />}
              <MItem icon={Icon.shield} label="Objection handling" toggle={node.objection.enabled} tip='"objection_attempts": 2' onClick={()=>upObj({enabled:!node.objection.enabled})} />
              <MItem icon={Icon.flag}   label="Refusal handling"   toggle={node.refusal.enabled}   tip='"refusal_handling": ["..."]'
                onClick={()=>upRef({enabled:!node.refusal.enabled, items:(!node.refusal.enabled && node.refusal.items.length===0)?[""]:node.refusal.items})} />
              <div className="hr" style={{margin:"6px 4px"}}/>
              <MItem icon={Icon.trash} label="Delete goal" danger onClick={()=>{onDelete();close();}} />
            </>)}
          </Menu>
        </div>
        <div className="name-row"><input className="name-in" title='"name":"<goal name>"' placeholder="Goal name…" value={node.name} onChange={e=>up({name:e.target.value})} /></div>
        {advBadges.length>0 && <div className="badges" style={{marginTop:10}}>{advBadges}</div>}
        {node.condition!==null && (
          <div className="cond-pill">
            {Icon.cond}
            <input title='"conditions":"email != empty and consents = yes"' value={node.condition} placeholder="goal condition  e.g.  email != empty and consents = yes"
              onChange={e=>up({condition:e.target.value})} />
            <span className="x" onClick={()=>up({condition:null})}>{Icon.x}</span>
          </div>
        )}
      </div>

      {/* MESSAGES */}
      <Section icon={Icon.msg} color="#2e8af6" title="Messages" count={node.messages.length}
        open={node.open.messages} onToggle={()=>toggleSec("messages")}>
        {node.messages.map((m,i)=>(
          <MessageRow key={m.id} msg={m} idx={i}
            onChange={nm=>up({messages:node.messages.map(x=>x.id===m.id?nm:x)})}
            onDelete={()=>up({messages:node.messages.filter(x=>x.id!==m.id)})} />
        ))}
        <button className="add-row" onClick={()=>up({messages:[...node.messages,newMessage()]})}>{Icon.plus} Add message</button>
        <div className="hr"/>
        <Field label="Acknowledge answer" style={{marginBottom:0}}
          desc="How the agent confirms the user's previous answer before continuing. Auto-generates by default; can be disabled or set to fixed text."
          json={ackJson}>
          <select value={node.acknowledge} onChange={e=>up({acknowledge:e.target.value})}>
            <option value="auto">Auto-generate</option>
            <option value="off">Disabled</option>
            <option value="custom">Custom text…</option>
          </select>
          {node.acknowledge==="custom" && (
            <input className="tin" style={{marginTop:7}} placeholder="e.g.  Great, thanks!" value={node.ackText} onChange={e=>up({ackText:e.target.value})} />
          )}
        </Field>
      </Section>

      {/* TRIGGERS */}
      {node.triggers.enabled && (
        <Section icon={Icon.bolt} color="#2e8af6" title="Triggers"
          open={node.open.triggers} onToggle={()=>toggleSec("triggers")}>
          <Field label="Positive triggers" desc="User intents that activate this goal reactively."
            json={`"triggers": [${node.triggers.positive.map(t=>JSON.stringify(t)).join(", ")}]`}>
            <ChipInput items={node.triggers.positive} onChange={t=>upTrig({positive:t})} placeholder="user intent…" />
          </Field>
          <Field label="Negative triggers" style={{marginBottom:0}}
            desc="User intents that should NOT activate this goal — fine-tunes detection and blocks proactive triggering."
            json={`"negative_triggers": [${node.triggers.negative.map(t=>JSON.stringify(t)).join(", ")}]`}>
            <ChipInput items={node.triggers.negative} onChange={t=>upTrig({negative:t})} placeholder="user intent to exclude…" />
          </Field>
        </Section>
      )}

      {/* VALUE COLLECTION (ask only, when the value type has options) */}
      {showValueSection && (
        <Section icon={Icon.collect} color="#8b5cf6" title="Value collection"
          open={node.open.value} onToggle={()=>toggleSec("value")}>
          <ValueCollection value={node.value} onChange={v=>up({value:v})} />
        </Section>
      )}

      {/* OBJECTION HANDLING */}
      {node.objection.enabled && (
        <Section icon={Icon.shield} color="#e5484d" title="Objection handling"
          open={node.open.objection} onToggle={()=>toggleSec("objection")}>
          <Field label="Max attempts" desc="How many times the agent tries to overcome an objection before giving up and moving on."
            json={`"objection_attempts": ${Number(node.objection.attempts)||0}`}>
            <input className="tin num-in" type="number" min="1" value={node.objection.attempts}
              onChange={e=>upObj({attempts:e.target.value})} />
            <div className="help">How many times the agent tries to overcome an objection before giving up.</div>
          </Field>
          <Field label="Objection condition"
            extra={<span style={{color:"var(--muted)",fontWeight:500,textTransform:"none",letterSpacing:0}}> · optional</span>}
            desc="A logical condition that defines when the user is objecting, based on collected values — e.g. 'interested = no'. Defaults to '<goal name> = no' for yes/no goals."
            json={`"objection_condition": ${JSON.stringify(node.objection.condition || (isAsk && node.value.type==="approval" ? `${node.name||"goal name"} = no` : "<condition>"))}`}>
            <input className="tin mono" value={node.objection.condition}
              placeholder={isAsk && node.value.type==="approval" ? `${node.name||"goal name"} = no  (default)` : "e.g.  interested = no"}
              onChange={e=>upObj({condition:e.target.value})} />
          </Field>
          <div className="flabel" style={{marginTop:4}}>Handler messages
            <span style={{color:"var(--muted)",fontWeight:500,textTransform:"none",letterSpacing:0}}> · optional</span>
            <InfoDot text="Messages the agent uses to handle the objection. Each is a message with objection_handler:true. Optional — agent generates its own if empty." />
          </div>
          {node.objection.messages.map((m,i)=>(
            <MessageRow key={m.id} msg={m} idx={i}
              onChange={nm=>upObj({messages:node.objection.messages.map(x=>x.id===m.id?nm:x)})}
              onDelete={()=>upObj({messages:node.objection.messages.filter(x=>x.id!==m.id)})} />
          ))}
          <button className="add-row" onClick={()=>upObj({messages:[...node.objection.messages,newMessage()]})}>{Icon.plus} Add handler message</button>
        </Section>
      )}

      {/* REFUSAL HANDLING */}
      {node.refusal.enabled && (
        <Section icon={Icon.flag} color="#e8920c" title="Refusal handling"
          open={node.open.refusal} onToggle={()=>toggleSec("refusal")}>
          <Field label="Responses if the user refuses" style={{marginBottom:0}}
            desc="What the agent can say if the user refuses to answer. Each line is one full response the agent may use."
            json={`"refusal_handling": [${node.refusal.items.filter(Boolean).map(r=>JSON.stringify(r)).join(", ")}]`}>
            <StringList items={node.refusal.items} onChange={r=>upRef({items:r})}
              placeholder="e.g.  I need this to continue helping you." addLabel="Add response" />
          </Field>
        </Section>
      )}

      {/* TOOLS */}
      <Section icon={Icon.tools} color="#1fae62" title="Tools" count={node.tools.length}
        open={node.open.tools} onToggle={()=>toggleSec("tools")}>
        {node.tools.length===0 && <div className="empty" style={{paddingBottom:12}}>No tools yet — add fulfillment actions or LLM functions.</div>}
        {fulfillment.length>0 && <div className="tool-group-label">{Icon.clock} Fulfillment actions</div>}
        {fulfillment.map((t)=>(
          <ToolCard key={t.id} tool={t} onDelete={()=>up({tools:node.tools.filter(x=>x.id!==t.id)})} />
        ))}
        {llm.length>0 && <div className="tool-group-label">{Icon.bolt} LLM tools</div>}
        {llm.map((t)=>(
          <ToolCard key={t.id} tool={t} onDelete={()=>up({tools:node.tools.filter(x=>x.id!==t.id)})} />
        ))}
        <button className="add-row" onClick={()=>setAddingTool(true)}>{Icon.plus} Add tool</button>
      </Section>

      {/* TRANSITIONS */}
      <Section icon={Icon.arrow} color="#e8920c" title="Transitions" count={node.transitions.length}
        open={node.open.transitions} onToggle={()=>toggleSec("transitions")}>
        {node.transitions.length===0 && <div className="empty" style={{paddingBottom:12}}>No transitions — add a branch to another goal.</div>}
        {node.transitions.map((tr)=>(
          <TransitionCard key={tr.id} tr={tr} goalNames={otherGoals}
            onChange={nt=>up({transitions:node.transitions.map(x=>x.id===tr.id?nt:x)})}
            onDelete={()=>up({transitions:node.transitions.filter(x=>x.id!==tr.id)})} />
        ))}
        <button className="add-row" onClick={()=>up({transitions:[...node.transitions,newTransition()]})}>{Icon.plus} Add transition</button>
      </Section>

      {/* CHILD GOALS */}
      {node.childGoals && (
        <Section icon={Icon.folder} color="#5b5bf6" title="Sub-goals" count={node.children.length}
          open={node.open.children} onToggle={()=>toggleSec("children")}>
          {node.children.length===0 && <div className="empty" style={{paddingBottom:10}}>No sub-goals yet.</div>}
          {node.children.map(c=>(
            <div key={c.id} className="msg" style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:"9px 11px"}} onClick={()=>onSelect && onSelect(c.id)}>
              <span className={"cn-ic "+(c.kind==="group"?"":(c.type||"say"))} style={{width:22,height:22}}>{c.kind==="group"?Icon.folder:(c.type==="ask"?Icon.ask:Icon.say)}</span>
              <span style={{flex:1,fontWeight:600,fontSize:13}}>{c.name||"Untitled goal"}</span>
              <span style={{color:"var(--muted)"}}>{Icon.chev}</span>
            </div>
          ))}
          <button className="add-row" onClick={()=>onAddChild && onAddChild(node.id)}>{Icon.plus} Add sub-goal</button>
        </Section>
      )}

      {addingTool && <AddToolModal goalNames={allGoalNames.filter(Boolean)}
        onClose={()=>setAddingTool(false)}
        onAdd={t=>up({tools:[...node.tools,{...t,id:uid()}]})} />}
    </div>
  );
}

/* ============================= SERIALIZER ============================= */
const toNum = s => { if(s==="") return null; const x=Number(s); return isNaN(x)?s:x; };
function actionsToFulfillment(timing, actions){
  const f={timing};
  (actions||[]).forEach(a=>{
    if(a.type==="values"){ const v={}; Object.entries(a.values||{}).forEach(([k,val])=>{ if(k) v[k]=val; }); f.values={...(f.values||{}),...v}; }
    else if(a.type==="call_result") f.call_result=a.call_result;
    else if(a.type==="webhook") f.webhook={url:a.url};
    else if(a.type==="text_message") f.text_message={message:a.message};
    else if(a.type==="trigger") f.trigger=a.target;
    else if(a.type==="voice_action") f.voice_action=a.voice;
  });
  return f;
}
function serializeMessage(m, goalGenerative, extra){
  const forced = m.forced && m.mode!=="prompt";
  const o={message:m.text};
  if(m.preMessage) o.pre_message=m.preMessage;
  if(m.condition) o.conditions=m.condition;
  if(m.explicit) o.explicit_part=m.explicit;
  if(forced) o.force_exact_response=true;
  if(!m.repeat) o.repeat=false;            // repeat is on by default; only emit when disabled
  if(m.exclusive) o.exclusive_message=true;
  if(goalGenerative && m.mode!=="prompt") o.generative=false;  // mark plain messages inside a generative goal
  if(extra) Object.assign(o, extra);
  return Object.keys(o).length===1 ? m.text : o;   // plain string only when no extra fields
}
function serializeLlmTool(t){
  const o={tool_name:t.tool_name, description:t.description};
  const props=(t.properties||[]).filter(p=>p.name);
  if(props.length){ o.properties={}; props.forEach(p=>{ o.properties[p.name]={type:p.type, description:p.description}; }); }
  if(t.actions && t.actions.length) o.fulfillment=[actionsToFulfillment("triggered",t.actions)];
  return o;
}
// ctx.choiceGroups: Map("<parentId>::<choiceId>" -> group node) so a choice can nest its sub-goals
function buildSerializeCtx(allNodes){
  const choiceGroups = new Map();
  const walk = ns => ns.forEach(n=>{ if(n.kind==="group" && n.choiceOf) choiceGroups.set(n.choiceOf.parentId+"::"+n.choiceOf.choiceId, n); if(n.children && n.children.length) walk(n.children); });
  walk(allNodes);
  return { choiceGroups };
}
function serializeAny(node, ctx={choiceGroups:new Map()}){ return node.kind==="group" ? serializeGroup(node, ctx) : serializeGoal(node, ctx); }
function serializeGroup(node, ctx){
  const g={ name: node.name || "group" };
  if(node.condition && node.condition.trim()) g.conditions = node.condition.trim();
  if(node.triggers && node.triggers.enabled){
    const pos=node.triggers.positive.filter(Boolean), neg=node.triggers.negative.filter(Boolean);
    if(pos.length) g.triggers=pos;
    if(neg.length) g.negative_triggers=neg;
  }
  const fulfillment = node.tools.filter(t=>t.kind==="timing").map(t=>actionsToFulfillment(t.timing,t.actions));
  if(fulfillment.length) g.fulfillment = fulfillment;
  const llm = node.tools.filter(t=>t.kind==="llm");
  if(llm.length) g.options = { llm_tools: llm.map(serializeLlmTool) };
  if(node.children.length) g.goals = node.children.map(c=>serializeAny(c, ctx));
  return g;
}
function serializeGoal(node, ctx={choiceGroups:new Map()}){
  const g={};
  g.name = node.name || "untitled goal";
  const isAsk = node.type==="ask";
  const generative = node.messages.some(m=>m.mode==="prompt");
  g.goal_type = isAsk ? (generative?"ask_generative":"ask") : (generative?"say_generative":"say");
  if(node.condition && node.condition.trim()) g.conditions = node.condition.trim();
  if(node.adv.repeat) g.repeat = true;
  if(!node.adv.proactive) g.proactive = false;

  if(node.triggers.enabled){
    const pos=node.triggers.positive.filter(Boolean);
    const neg=node.triggers.negative.filter(Boolean);
    if(pos.length) g.triggers=pos;
    if(neg.length) g.negative_triggers=neg;
  }

  const msgs = node.messages
    .filter(m=>(m.text&&m.text.trim()) || m.condition || m.explicit || m.preMessage)
    .map(m=>serializeMessage(m, generative));
  if(node.objection.enabled){
    node.objection.messages.filter(m=>m.text&&m.text.trim())
      .forEach(m=>msgs.push(serializeMessage(m, generative, {objection_handler:true})));
  }
  if(msgs.length) g.messages = msgs;

  if(node.acknowledge==="off") g.acknowledge=false;
  else if(node.acknowledge==="custom") g.acknowledge=node.ackText||"";

  if(isAsk){
    g.value_type = node.value.type;
    const options={};
    if(node.value.type==="unit" && node.value.unitType!=="any") options.unit_type=node.value.unitType;
    if(["year","month","date"].includes(node.value.type) && node.value.tense!=="any") options.tense=node.value.tense;
    if(node.value.range && (node.value.rangeMin!==""||node.value.rangeMax!=="")) options.range=[toNum(node.value.rangeMin), toNum(node.value.rangeMax)];
    if(Object.keys(options).length) g.options=options;
    if(node.value.type==="custom" && node.value.validation.trim()) g.validation_prompt=node.value.validation.trim();
    if(node.value.choices.length){
      g.choices = node.value.choices.map(c=>{
        const o={name:c.name};
        if(c.condition) o.conditions=c.condition;
        if(c.validation) o.validation_prompt=c.validation;
        if(c.ack) o.acknowledge=c.ack;
        if(c.triggers && c.triggers.length) o.triggers=c.triggers;
        if(c.negativeTriggers && c.negativeTriggers.length) o.negative_triggers=c.negativeTriggers;
        const grp = ctx.choiceGroups.get(node.id+"::"+c.id);   // sub-goals added via the choice anchor
        if(grp && grp.children.length) o.goals = grp.children.map(ch=>serializeAny(ch, ctx));
        return o;
      });
    }
    if(!node.value.passive) g.qualifier_blocks_passive_detection=true;
  }

  if(node.refusal.enabled){
    const r=node.refusal.items.filter(Boolean);
    if(r.length) g.refusal_handling=r;
  }

  if(node.objection.enabled){
    g.objection_attempts = toNum(String(node.objection.attempts)) ?? 0;
    const cond = node.objection.condition.trim() || (isAsk && node.value.type==="approval" ? `${node.name||"goal"} = no` : "");
    if(cond) g.objection_condition = cond;
  }

  const fulfillment = node.tools.filter(t=>t.kind==="timing").map(t=>actionsToFulfillment(t.timing,t.actions));
  if(fulfillment.length) g.fulfillment=fulfillment;

  const llm = node.tools.filter(t=>t.kind==="llm");
  if(llm.length){
    g.options = g.options || {};
    g.options.llm_tools = llm.map(serializeLlmTool);
  }

  if(node.transitions.length) g.transitions = node.transitions.map(tr=>{
    const o={};
    if(tr.name) o.name=tr.name;
    if(tr.target) o.target=tr.target;
    if(tr.prompt) o.prompt=tr.prompt;
    if(tr.conditions) o.conditions=tr.conditions;
    const values={}; tr.assigned.forEach(kv=>{ if(kv.k) values[kv.k]=kv.v; });
    if(Object.keys(values).length) o.values=values;
    const props={}; (tr.properties||[]).forEach(p=>{ if(p.name) props[p.name]={type:p.type, description:p.description}; });
    if(Object.keys(props).length) o.properties=props;
    return o;
  });

  if(node.children && node.children.length) g.goals = node.children.map(c=>serializeAny(c, ctx));
  return g;
}
/* tiny JSON syntax highlighter -> HTML */
function highlightJson(obj){
  const json = JSON.stringify(obj, null, 2)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?)/g, m=>{
    let cls="jnum";
    if(/^"/.test(m)) cls = /:$/.test(m) ? "jkey" : "jstr";
    else if(/true|false/.test(m)) cls="jbool";
    else if(/null/.test(m)) cls="jbool";
    return `<span class="${cls}">${m}</span>`;
  });
}

/* ============================= CANVAS GRAPH ============================= */
const CN_W = 230;
// Output ports (bottom-right, one per line): one per choice, one per transition.
function nodePorts(node){
  const a = [];
  if(node.type==="ask"){
    node.value.choices.forEach(c=>a.push({key:"choice:"+c.id, type:"choice", label:c.name||"option"}));
  }
  node.transitions.forEach(t=>a.push({key:"trans:"+t.id, type:"trans", label:t.name||"transition"}));
  return a;
}
function firstMessage(node){
  const m = node.messages.find(x=>x.text && x.text.trim());
  return m ? {text:m.text, prompt:m.mode==="prompt"} : null;
}

function CanvasNode({node, selected, hasSeqChild, nested, zoom=1, selectedId, onSelectId, onAddChild, onSelect, onStartDrag, onAnchor, reportGeom}){
  const ref = useRef();
  const circs = useRef({});
  useEffect(()=>{
    if(nested || !ref.current || !reportGeom) return;
    const cr = ref.current.getBoundingClientRect();
    const anchors = {};
    Object.entries(circs.current).forEach(([key,el])=>{
      if(!el) return;
      const r = el.getBoundingClientRect();
      // rects are in screen px (scaled); divide by zoom to get unscaled stage coords for edges
      anchors[key] = { dx: Math.round((r.left+r.width/2-cr.left)/zoom), dy: Math.round((r.top+r.height/2-cr.top)/zoom) };
    });
    reportGeom(node.id, anchors);
  });
  const isAsk = node.type==="ask";
  const fm = firstMessage(node);
  const ports = nodePorts(node);
  return (
    <div ref={ref} className={"cnode"+(nested?" nested":"")+(selected?" sel":"")}
      style={nested?undefined:{left:node.x, top:node.y}}
      onMouseDown={e=>{ if(nested) e.stopPropagation(); onSelect(); }}>
      <div className="cn-head" style={nested?{cursor:"pointer"}:undefined}
        onMouseDown={e=>{ if(nested) e.stopPropagation(); else onStartDrag(e, node); }}>
        <span className={"cn-ic "+node.type}>{isAsk?Icon.ask:Icon.say}</span>
        <span className={"cn-name"+(node.name?"":" empty")}>{node.name||"Untitled goal"}</span>
      </div>
      <div className={"cn-msg"+(fm?"":" empty")}>
        {fm ? (<>{fm.prompt && <span className="genmark">✦ </span>}{fm.text}</>) : "No message yet"}
      </div>
      {!nested && node.childGoals && (
        <div className="cn-children" onMouseDown={e=>e.stopPropagation()}>
          {(!node.children || node.children.length===0) && <div className="cn-children-empty">No sub-goals yet</div>}
          {(node.children||[]).map(c=>(
            <div key={c.id} className={"group-min-child"+(selectedId===c.id?" sel":"")}
              onMouseDown={e=>e.stopPropagation()} onClick={e=>{ e.stopPropagation(); onSelectId(c.id); }}>
              <span className="ic">{c.kind==="group"?Icon.folder:(c.type==="ask"?Icon.ask:Icon.say)}</span>
              <span className="lbl">{c.name||"Untitled goal"}</span>
            </div>
          ))}
          <button className="cn-children-add" onClick={e=>{ e.stopPropagation(); onAddChild(node.id); }}>{Icon.plus} Add sub-goal</button>
        </div>
      )}
      {ports.length>0 && (
        <div className="cn-ports">
          {ports.map(p=>(
            <div key={p.key} className={"cn-port "+p.type}
              title={p.type==="choice"?`Add a sub-goal under choice "${p.label}"`:`Add the target goal of transition "${p.label}"`}
              onMouseDown={e=>e.stopPropagation()}
              onClick={e=>{ e.stopPropagation(); onAnchor(node, p); }}>
              <span className="plabel">{p.label}</span>
              <span className="pcircle" ref={el=>circs.current[p.key]=el} />
            </div>
          ))}
        </div>
      )}
      {(!nested || !hasSeqChild) && (
        <div className={"cn-add"+(hasSeqChild?" connected":"")}
          title={hasSeqChild?"":"Add the next goal in sequence"}
          onMouseDown={e=>e.stopPropagation()}
          onClick={hasSeqChild ? undefined : (e=>{ e.stopPropagation(); onAnchor(node, {key:"seq", type:"seq", label:"add"}); })}>
          {!hasSeqChild && <span className="cn-add-btn">{Icon.plus} Add</span>}
          {!nested && <span className="pcircle" ref={el=>circs.current["seq"]=el} />}
        </div>
      )}
    </div>
  );
}

function GroupNode({group, selectedId, onSelect, onStartDrag, onAddChild, onSetMinimized}){
  if(group.minimized){
    return (
      <div className={"group-min"+(selectedId===group.id?" sel":"")} style={{left:group.x, top:group.y}}>
        <div className="group-min-head" title="Click to expand group"
          onMouseDown={e=>onStartDrag(e, group)}
          onClick={()=>{ onSelect(group.id); onSetMinimized(group.id,false); }}>
          <span className="group-ic">{Icon.folder}</span>
          <span className={"gname"+(group.name?"":" empty")}>{group.name||"Group"}</span>
          <span className="gcount">{group.children.length}</span>
        </div>
        {group.children.length>0 && (
          <div className="group-min-children">
            {group.children.map(c=>(
              <div key={c.id} className={"group-min-child"+(selectedId===c.id?" sel":"")}
                onMouseDown={e=>e.stopPropagation()} onClick={()=>onSelect(c.id)}>
                <span className="ic">{c.kind==="group"?Icon.folder:(c.type==="ask"?Icon.ask:Icon.say)}</span>
                <span className="lbl">{c.name||"Untitled goal"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  return (
    <div className={"group"+(selectedId===group.id?" sel":"")} style={{left:group.x, top:group.y}}
      onMouseDown={()=>onSelect(group.id)}>
      <div className="group-head" onMouseDown={e=>onStartDrag(e, group)}>
        <span className="group-ic">{Icon.folder}</span>
        <span className={"group-name"+(group.name?"":" empty")}>{group.name||"Untitled group"}</span>
        {group.triggers && group.triggers.enabled && <span className="group-fulfill" style={{background:"var(--say-soft)",color:"var(--say)"}}>{Icon.bolt}</span>}
        {group.tools.length>0 && <span className="group-fulfill">{group.tools.length} fulfillment</span>}
        <button className="btn icon ghost sm" title="Minimize group"
          onMouseDown={e=>e.stopPropagation()} onClick={e=>{ e.stopPropagation(); onSetMinimized(group.id,true); }}>{Icon.minimize}</button>
      </div>
      {group.condition!==null && <div className="group-cond">{Icon.cond}<span style={{flex:1}}>{group.condition||"<condition>"}</span></div>}
      <div className="group-add">
        <span className="pcircle"/>
        <button className="group-add-btn" onMouseDown={e=>e.stopPropagation()}
          onClick={e=>{ e.stopPropagation(); onAddChild(group.id); }}>{Icon.plus} Add goal</button>
      </div>
      <div className="group-body">
        {group.children.length===0 && <div className="group-empty">No sub-goals yet</div>}
        {group.children.map((c,i)=>(
          <CanvasNode key={c.id} node={c} nested selected={selectedId===c.id}
            hasSeqChild={i < group.children.length-1}
            onSelect={()=>onSelect(c.id)} onAnchor={()=>onAddChild(group.id)} />
        ))}
      </div>
    </div>
  );
}

function Canvas({nodes, selectedId, onSelect, onMoveNode, onAnchor, onAddChild, onSetMinimized}){
  const [anchorPos,setAnchorPos] = useState({});
  const reportGeom = useCallback((id,anchors)=>{
    setAnchorPos(prev=>{
      const old = prev[id];
      if(old && JSON.stringify(old)===JSON.stringify(anchors)) return prev;
      return {...prev, [id]:anchors};
    });
  },[]);
  const drag = useRef(null);
  const canvasRef = useRef();
  const [zoom,setZoom] = useState(1);
  const zoomRef = useRef(1); zoomRef.current = zoom;
  const STAGE_W=4000, STAGE_H=2600;
  const clampZoom = z => Math.min(2.5, Math.max(0.3, z));

  // pinch / ctrl+wheel zoom, anchored to the cursor
  useEffect(()=>{
    const c = canvasRef.current; if(!c) return;
    const onWheel = e => {
      if(!e.ctrlKey) return;            // trackpad pinch & ctrl+wheel both set ctrlKey
      e.preventDefault();
      const z0 = zoomRef.current;
      const z1 = clampZoom(z0 * Math.exp(-e.deltaY*0.002));
      if(z1===z0) return;
      const rect = c.getBoundingClientRect();
      const cx = e.clientX-rect.left, cy = e.clientY-rect.top;
      const contentX = (c.scrollLeft+cx)/z0, contentY = (c.scrollTop+cy)/z0;
      zoomRef.current = z1; setZoom(z1);
      requestAnimationFrame(()=>{ c.scrollLeft = contentX*z1-cx; c.scrollTop = contentY*z1-cy; });
    };
    c.addEventListener("wheel", onWheel, {passive:false});
    return ()=>c.removeEventListener("wheel", onWheel);
  },[]);
  // button zoom, anchored to the canvas centre
  const zoomBy = factor => {
    const c = canvasRef.current; if(!c) return;
    const z0 = zoomRef.current, z1 = clampZoom(z0*factor);
    if(z1===z0) return;
    const cx = c.clientWidth/2, cy = c.clientHeight/2;
    const contentX = (c.scrollLeft+cx)/z0, contentY = (c.scrollTop+cy)/z0;
    zoomRef.current = z1; setZoom(z1);
    requestAnimationFrame(()=>{ c.scrollLeft = contentX*z1-cx; c.scrollTop = contentY*z1-cy; });
  };
  const resetZoom = ()=>{ zoomRef.current=1; setZoom(1); };

  // keep the selected node in view (new nodes are placed to the right and would otherwise be off-screen)
  useEffect(()=>{
    if(!selectedId || !canvasRef.current || drag.current) return;
    const c = canvasRef.current;
    const el = c.querySelector(".sel");
    if(!el) return;
    const cRect = c.getBoundingClientRect(), eRect = el.getBoundingClientRect();
    const targetLeft = c.scrollLeft + (eRect.left - cRect.left) - (c.clientWidth  - eRect.width )/2;
    const targetTop  = c.scrollTop  + (eRect.top  - cRect.top ) - (c.clientHeight - eRect.height)/2;
    c.scrollTo({ left:Math.max(0,targetLeft), top:Math.max(0,targetTop), behavior:"smooth" });
  },[selectedId, nodes.length]);

  const startDrag = (e, node) => {
    e.preventDefault();
    drag.current = {id:node.id, sx:e.clientX, sy:e.clientY, nx:node.x, ny:node.y};
    const move = ev => { if(!drag.current) return; const z=zoomRef.current;
      onMoveNode(drag.current.id, Math.round(drag.current.nx + (ev.clientX-drag.current.sx)/z), Math.round(drag.current.ny + (ev.clientY-drag.current.sy)/z)); };
    const upH = () => { drag.current=null; document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",upH); };
    document.addEventListener("mousemove",move); document.addEventListener("mouseup",upH);
  };

  // Nodes that already have a sequence child -> not the last goal, hide their Add button.
  const seqParents = new Set(nodes.filter(n=>n.edgeFrom && n.edgeFrom.type==="seq").map(n=>n.edgeFrom.fromId));
  // Build edges originating from each parent's anchor circle.
  const byId = {}; nodes.forEach(n=>byId[n.id]=n);
  const edges = [];
  nodes.forEach(n=>{
    if(!n.edgeFrom) return;
    const p = byId[n.edgeFrom.fromId];
    if(!p) return;
    const src = (anchorPos[p.id]||{})[n.edgeFrom.key];
    const horiz = n.edgeFrom.type!=="seq";          // right-edge ports exit sideways; 'add' exits down
    let sx, sy;
    if(src){ sx = p.x+src.dx; sy = p.y+src.dy; }
    else if(n.edgeFrom.type==="seq"){ sx = p.x+CN_W/2; sy = p.y+150; }   // fallback before measurement
    else return;                                     // choice/transition anchor not measured yet
    const tx = n.x + CN_W/2, ty = n.y;
    let d;
    if(horiz){ d = `M ${sx} ${sy} C ${sx+50} ${sy}, ${tx} ${ty-55}, ${tx} ${ty}`; }
    else { const dy=Math.max(40,(ty-sy)/2); d = `M ${sx} ${sy} C ${sx} ${sy+dy}, ${tx} ${ty-dy}, ${tx} ${ty}`; }
    edges.push({ id:n.id, type:n.edgeFrom.type, d, sx, sy });
  });

  return (
    <div className="canvas" ref={canvasRef}
      onMouseDown={e=>{ if(e.target.classList.contains("canvas")||e.target.classList.contains("canvas-stage")||e.target.classList.contains("canvas-sizer")) onSelect(null); }}>
      <div className="canvas-sizer" style={{width:STAGE_W*zoom, height:STAGE_H*zoom}}>
        <div className="canvas-stage" style={{transform:`scale(${zoom})`}}>
          <svg className="edges">
            {edges.map(e=><path key={e.id} className={"edge "+e.type} d={e.d} />)}
          </svg>
          {nodes.map(n=> n.kind==="group" ? (
            <GroupNode key={n.id} group={n} selectedId={selectedId} onSelect={onSelect} onStartDrag={startDrag}
              onAddChild={onAddChild} onSetMinimized={onSetMinimized} />
          ) : (
            <CanvasNode key={n.id} node={n} selected={selectedId===n.id} hasSeqChild={seqParents.has(n.id)} zoom={zoom}
              selectedId={selectedId} onSelectId={onSelect} onAddChild={onAddChild}
              onSelect={()=>onSelect(n.id)} onStartDrag={startDrag} onAnchor={onAnchor} reportGeom={reportGeom} />
          ))}
        </div>
      </div>
      <div className="zoombar">
        <button title="Zoom out" onClick={()=>zoomBy(1/1.2)}>−</button>
        <span className="zval" title="Reset to 100%" onClick={resetZoom}>{Math.round(zoom*100)}%</span>
        <button title="Zoom in" onClick={()=>zoomBy(1.2)}>+</button>
      </div>
    </div>
  );
}

/* ============================= JSON DRAWER ============================= */
function JsonDrawer({node, allNodes, onClose}){
  const [scope,setScope]=useState("goal");
  const ctx = buildSerializeCtx(allNodes);
  const data = scope==="goal"
    ? (node ? serializeAny(node, ctx) : {})
    : { goals: allNodes.filter(n=>!n.choiceOf).map(n=>serializeAny(n, ctx)) };  // choice-groups nest under their choice
  const [copied,setCopied]=useState(false);
  const copy=()=>{ navigator.clipboard?.writeText(JSON.stringify(data,null,2)); setCopied(true); setTimeout(()=>setCopied(false),1200); };
  return (
    <div className="drawer">
      <div className="drawer-head">
        <span style={{color:"#82aaff"}}>{Icon.collect}</span>
        <div style={{flex:1}}>
          <div className="dt">Live JSON</div>
          <div className="gname">{scope==="goal" ? (node?.name||"untitled goal") : `${allNodes.length} goals`}</div>
        </div>
        <button className="drawer-btn" onClick={copy}>{copied?Icon.check:Icon.collect} {copied?"Copied":"Copy"}</button>
        <button className="drawer-btn" onClick={onClose}>{Icon.x}</button>
      </div>
      <div className="drawer-tabs">
        <button className={"drawer-tab"+(scope==="goal"?" on":"")} onClick={()=>setScope("goal")}>Selected goal</button>
        <button className={"drawer-tab"+(scope==="all"?" on":"")} onClick={()=>setScope("all")}>Full script</button>
      </div>
      <pre dangerouslySetInnerHTML={{__html:highlightJson(data)}} />
    </div>
  );
}

/* ============================= GROUP EDITOR (right panel) ============================= */
function GroupEditor({node, onChange, onDelete, onAddChild, onSelect}){
  const up = patch => onChange({...node, ...patch});
  const upTrig = patch => up({triggers:{...node.triggers, ...patch}});
  const [addingTool,setAddingTool]=useState(false);
  const [openSub,setOpenSub]=useState(true);
  const [openTools,setOpenTools]=useState(true);
  const [openTrig,setOpenTrig]=useState(true);
  const fulfillment = node.tools.filter(t=>t.kind==="timing");
  const llm = node.tools.filter(t=>t.kind==="llm");
  return (
    <div className="node-editor">
      <div className="node-head">
        <div className="node-head-row">
          <div className="typetog">
            <button data-t="say" title='convert to a say goal' onClick={()=>onChange(convertNode(node,"say"))}>{Icon.say} Say</button>
            <button data-t="ask" title='convert to an ask goal' onClick={()=>onChange(convertNode(node,"ask"))}>{Icon.ask} Ask</button>
            <button data-t="group" className="on" title='"goal_type":"group"'>{Icon.folder} Group</button>
          </div>
          <div style={{flex:1}}/>
          <Menu trigger={<button className="btn icon ghost">{Icon.dots}</button>}>
            {close=>(<>
              <div className="menu-sec">Add</div>
              <MItem icon={Icon.cond} label={node.condition!==null?"Edit condition":"Add condition"}
                tip='"conditions": "..."' onClick={()=>{ up({condition:node.condition??""}); close(); }} />
              <MItem icon={Icon.bolt} label="Triggers" toggle={node.triggers.enabled}
                tip='"triggers": ["..."], "negative_triggers": ["..."]' onClick={()=>upTrig({enabled:!node.triggers.enabled})} />
              <div className="hr" style={{margin:"6px 4px"}}/>
              <MItem icon={Icon.trash} label="Delete group" danger onClick={()=>{ onDelete(); close(); }} />
            </>)}
          </Menu>
        </div>
        <div className="name-row"><input className="name-in" title='"name":"<group name>"' placeholder="Group name…" value={node.name} onChange={e=>up({name:e.target.value})} /></div>
        <div className="badges" style={{marginTop:10}}>
          <span className="badge accent">{Icon.folder} group container</span>
          {node.triggers.enabled && <span className="badge" style={{background:"var(--say-soft)",color:"var(--say)",borderColor:"transparent"}}>{Icon.bolt} triggers</span>}
        </div>
        {node.condition!==null && (
          <div className="cond-pill">{Icon.cond}
            <input title='"conditions":"..."' value={node.condition} placeholder="group condition  e.g.  stage = qualified"
              onChange={e=>up({condition:e.target.value})} />
            <span className="x" onClick={()=>up({condition:null})}>{Icon.x}</span>
          </div>
        )}
      </div>
      {node.triggers.enabled && (
        <Section icon={Icon.bolt} color="#2e8af6" title="Triggers" open={openTrig} onToggle={()=>setOpenTrig(o=>!o)}>
          <Field label="Positive triggers" desc="User intents that activate this group reactively."
            json={`"triggers": [${node.triggers.positive.map(t=>JSON.stringify(t)).join(", ")}]`}>
            <ChipInput items={node.triggers.positive} onChange={t=>upTrig({positive:t})} placeholder="user intent…" />
          </Field>
          <Field label="Negative triggers" style={{marginBottom:0}}
            desc="User intents that should NOT activate this group."
            json={`"negative_triggers": [${node.triggers.negative.map(t=>JSON.stringify(t)).join(", ")}]`}>
            <ChipInput items={node.triggers.negative} onChange={t=>upTrig({negative:t})} placeholder="user intent to exclude…" />
          </Field>
        </Section>
      )}
      <Section icon={Icon.folder} color="#5b5bf6" title="Sub-goals" count={node.children.length}
        open={openSub} onToggle={()=>setOpenSub(o=>!o)}>
        {node.children.length===0 && <div className="empty" style={{paddingBottom:10}}>No sub-goals yet.</div>}
        {node.children.map(c=>(
          <div key={c.id} className="msg" style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:"9px 11px"}} onClick={()=>onSelect(c.id)}>
            <span className={"cn-ic "+(c.type||"say")} style={{width:22,height:22}}>{c.type==="ask"?Icon.ask:Icon.say}</span>
            <span style={{flex:1,fontWeight:600,fontSize:13}}>{c.name||"Untitled goal"}</span>
            <span style={{color:"var(--muted)"}}>{Icon.chev}</span>
          </div>
        ))}
        <button className="add-row" onClick={()=>onAddChild(node.id)}>{Icon.plus} Add sub-goal</button>
      </Section>
      <Section icon={Icon.tools} color="#1fae62" title="Fulfillment" count={node.tools.length}
        open={openTools} onToggle={()=>setOpenTools(o=>!o)}>
        {node.tools.length===0 && <div className="empty" style={{paddingBottom:12}}>No fulfillment actions yet.</div>}
        {fulfillment.length>0 && <div className="tool-group-label">{Icon.clock} Fulfillment actions</div>}
        {fulfillment.map(t=><ToolCard key={t.id} tool={t} onDelete={()=>up({tools:node.tools.filter(x=>x.id!==t.id)})} />)}
        {llm.length>0 && <div className="tool-group-label">{Icon.bolt} LLM tools</div>}
        {llm.map(t=><ToolCard key={t.id} tool={t} onDelete={()=>up({tools:node.tools.filter(x=>x.id!==t.id)})} />)}
        <button className="add-row" onClick={()=>setAddingTool(true)}>{Icon.plus} Add tool</button>
      </Section>
      {addingTool && <AddToolModal goalNames={[]} onClose={()=>setAddingTool(false)}
        onAdd={t=>up({tools:[...node.tools,{...t,id:uid()}]})} />}
    </div>
  );
}

/* ============================= PRESETS ============================= */
const seqFrom    = p => ({fromId:p.id, key:"seq", type:"seq", label:"add"});
const mkMsg      = (text, opts={}) => ({...newMessage(), text, ...opts});
const mkTrans    = (over={}) => ({...newTransition(), ...over});
const mkTool     = (over={}) => ({...over, id:uid()});
function mkNode(over={}){
  const base = newNode(over.type||"say");
  const {value, adv, triggers, objection, refusal, ...rest} = over;
  const mergedValue = {...base.value, ...(value||{})};
  // don't carry the default yes/no choices onto value types where they make no sense
  if(value && value.type && !["approval","selection"].includes(value.type) && !value.choices) mergedValue.choices = [];
  return {...base, ...rest,
    value:mergedValue,
    adv:{...base.adv, ...(adv||{})},
    triggers:{...base.triggers, ...(triggers||{})},
    objection:{...base.objection, ...(objection||{})},
    refusal:{...base.refusal, ...(refusal||{})}};
}

function presetInsurance(){
  const g1 = mkNode({type:"ask", name:"good time to talk", x:90, y:70,
    messages:[mkMsg("Hi {contact_name}, this is {%agent_name%} from {%company_name%} on a recorded line. Is now a good time to talk?")],
    value:{type:"approval", choices:[newChoice("yes"), newChoice("no")]},
    objection:{enabled:true, attempts:2, condition:"good time to talk = no", messages:[mkMsg("It'll only take a minute of your time.")]}});
  const g2 = mkNode({type:"ask", name:"looking for insurance", x:90, y:380, edgeFrom:seqFrom(g1),
    messages:[mkMsg("Are you interested in insuring your property?")],
    value:{type:"approval", choices:[newChoice("yes"), Object.assign(newChoice("no"),{ack:"I understand."})]},
    refusal:{enabled:true, items:["I'd like to confirm you're interested before we continue."]}});
  g2.transitions = [mkTrans({name:"not interested", target:"hang up", prompt:"user clearly states they are not interested at all"})];
  const g3 = mkNode({type:"ask", name:"number of employees", x:90, y:690, edgeFrom:seqFrom(g2),
    messages:[mkMsg("Roughly how many employees does your business have?")],
    value:{type:"number", range:true, rangeMin:"1", rangeMax:"5000"},
    condition:"looking for insurance = yes"});
  const g4 = mkNode({type:"say", name:"wrap up", x:90, y:920, edgeFrom:seqFrom(g3),
    messages:[mkMsg("Great — a licensed agent will reach out shortly with your quote. Thanks for your time!", {forced:true})],
    tools:[mkTool({kind:"timing", timing:"completed", actions:[{type:"call_result", call_result:"converted"},
      {type:"webhook", url:"https://crm.example.com/leads/{chat_id}"}]})]});
  return [g1,g2,g3,g4];
}

function presetSupport(){
  const g1 = mkNode({type:"say", name:"troubleshoot issue", x:90, y:70,
    messages:[mkMsg("Help the user diagnose and resolve their connectivity issue step by step. Ask clarifying questions and suggest concrete fixes one at a time.", {mode:"prompt"})],
    adv:{repeat:true},
    triggers:{enabled:true, positive:["my internet is down","I can't connect","it's not working"], negative:["billing question"]},
    objection:{enabled:true, attempts:3, condition:"", messages:[mkMsg("I know it's frustrating — let's try one more thing.")]}});
  const g2 = mkNode({type:"say", name:"close ticket", x:430, y:430, edgeFrom:{fromId:g1.id, key:"trans:placeholder", type:"trans", label:"resolved"},
    messages:[mkMsg("Glad that worked! I'll close out this ticket. Have a great day.")],
    tools:[mkTool({kind:"timing", timing:"completed", actions:[{type:"call_result", call_result:"qualified"}]})]});
  const tr1 = mkTrans({name:"resolved", target:"close ticket", prompt:"user confirms the issue is fixed"});
  const tr2 = mkTrans({name:"needs human", target:"transfer to customer", prompt:"user asks for a human, or the issue cannot be resolved",
    properties:[{name:"reason", type:"string", description:"why the user needs a human agent"}]});
  g1.transitions = [tr1, tr2];
  g2.edgeFrom = {fromId:g1.id, key:"trans:"+tr1.id, type:"trans", label:"resolved"};
  return [g1,g2];
}

function presetBooking(){
  const g1 = mkNode({type:"ask", name:"contact_email", x:90, y:70,
    messages:[mkMsg("What's the best email to send your confirmation to?")],
    value:{type:"email"}});
  const g2 = mkNode({type:"ask", name:"preferred time", x:90, y:300, edgeFrom:seqFrom(g1),
    messages:[mkMsg("What time of day works best — morning, afternoon, or evening?")],
    value:{type:"selection", choices:[newChoice("morning"), newChoice("afternoon"), newChoice("evening")]}});
  const g3 = mkNode({type:"say", name:"confirm booking", x:90, y:600, edgeFrom:seqFrom(g2),
    messages:[mkMsg("Perfect — you're booked for the {preferred time}. A confirmation is on its way to {contact_email}!")],
    tools:[mkTool({kind:"llm", tool_name:"create_booking", description:"Create the calendar booking for the selected time slot and email.",
      properties:[
        {name:"slot", type:"string", description:"the selected time of day (morning/afternoon/evening)"},
        {name:"email", type:"string", description:"the contact's confirmation email"},
        {name:"send_sms", type:"boolean", description:"whether to also send an SMS reminder"}],
      actions:[{type:"text_message", message:"Your appointment is confirmed for {preferred time}."}]})]});
  return [g1,g2,g3];
}

const PRESETS = [
  {name:"Insurance lead qualification", desc:"Outbound voice — qualify & convert", build:presetInsurance},
  {name:"Support troubleshooting",      desc:"Generative behavior, triggers & objections", build:presetSupport},
  {name:"Appointment booking",          desc:"Collect email, pick a time, confirm", build:presetBooking},
  {name:"Blank canvas",                 desc:"Start from a single empty goal", build:()=>[{...newNode("say"), x:90, y:90}]},
];

/* ============================= APP ============================= */
function App(){
  const [nodes,setNodes]=useState(()=>[{...newNode("say"), x:90, y:90}]);
  const [sel,setSel]=useState(nodes[0].id);
  const [tab,setTab]=useState("edit");   // right-panel tab: edit | json
  const allNames = allNodeNames(nodes);
  const selNode = findNodeTree(nodes, sel);

  const updateNode = (id,nn)=>setNodes(ns=>mapNodeTree(ns, id, ()=>nn));
  const moveNode = (id,x,y)=>setNodes(ns=>mapNodeTree(ns, id, n=>({...n,x,y})));
  const delNode = id=>{ setNodes(ns=>removeNodeTree(ns, id)); if(sel===id) setSel(null); };

  const addGoal = ()=>{
    const maxX = Math.max(0, ...nodes.map(n=>n.x));
    const n = {...newNode("say"), x:maxX+CN_W+90, y:90};
    setNodes(ns=>[...ns,n]); setSel(n.id); setTab("edit");
  };
  const addGroup = ()=>{
    const maxX = Math.max(0, ...nodes.map(n=>n.x));
    const g = {...newGroup(), minimized:false, x:maxX+CN_W+90, y:90};
    setNodes(ns=>[...ns,g]); setSel(g.id); setTab("edit");
  };
  // Add a node connected from one of a node's anchors (sequence 'add' / choice / transition).
  const addFrom = (parent, anchor)=>{
    // a choice anchor adds the new goal *inside* that choice (a choice-group container)
    if(anchor.type==="choice"){
      const choiceId = anchor.key.slice("choice:".length);
      const existing = nodes.find(n=>n.kind==="group" && n.choiceOf && n.choiceOf.parentId===parent.id && n.choiceOf.choiceId===choiceId);
      const child = newNode("say");
      if(existing){
        setNodes(ns=>mapNodeTree(ns, existing.id, g=>({...g, children:[...g.children, child]})));
      }else{
        const peers = nodes.filter(n=>n.choiceOf && n.choiceOf.parentId===parent.id).length;
        const grp = {...newGroup(), minimized:false, name:anchor.label,
          choiceOf:{parentId:parent.id, choiceId},
          x: parent.x + CN_W + 120, y: parent.y + peers*210,
          edgeFrom:{fromId:parent.id, key:anchor.key, type:"choice", label:anchor.label},
          children:[child]};
        setNodes(ns=>[...ns, grp]);
      }
      setSel(child.id); setTab("edit");
      return;
    }
    const children = nodes.filter(n=>n.edgeFrom && n.edgeFrom.fromId===parent.id);
    const n = {...newNode("say"),
      x: parent.x + (anchor.type==="seq" ? 0 : CN_W + 120),
      y: parent.y + 250 + children.length*42,
      edgeFrom:{fromId:parent.id, key:anchor.key, type:anchor.type, label:anchor.label}};
    setNodes(ns=>[...ns,n]); setSel(n.id); setTab("edit");
  };
  // Add a child goal inside a group container.
  const addChild = (groupId)=>{
    const child = newNode("say");
    setNodes(ns=>mapNodeTree(ns, groupId, g=>({...g, children:[...g.children, child]})));
    setSel(child.id); setTab("edit");
  };
  const setMinimized = (id, val)=>setNodes(ns=>mapNodeTree(ns, id, g=>({...g, minimized:val})));

  const loadPreset = (p)=>{ const ns=p.build(); setNodes(ns); setSel(ns[0].id); setTab("edit"); };

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <span className="logo">{Icon.bolt}</span>
          <div>AI Script Flow <small>· node config mock</small></div>
        </div>
        <div className="spacer"/>
        <Menu align="right" minW={260} trigger={<button className="btn">{Icon.star} Presets {Icon.caret}</button>}>
          {close=>(<>
            <div className="menu-sec">Load a sample script</div>
            {PRESETS.map(p=>(
              <MItem key={p.name} icon={Icon.bolt}
                label={<span><span style={{display:"block",fontWeight:600}}>{p.name}</span><span style={{display:"block",fontSize:11,color:"var(--muted)",fontWeight:500}}>{p.desc}</span></span>}
                onClick={()=>{ loadPreset(p); close(); }} />
            ))}
          </>)}
        </Menu>
        <button className="btn" onClick={addGroup}>{Icon.folder} Add group</button>
        <button className="btn primary" onClick={addGoal}>{Icon.plus} Add goal</button>
      </div>
      <div className="workspace">
        <Canvas nodes={nodes} selectedId={sel} onSelect={setSel} onMoveNode={moveNode} onAnchor={addFrom}
          onAddChild={addChild} onSetMinimized={setMinimized} />
        <div className="panel">
          <div className="panel-tabs">
            <button className={"panel-tab"+(tab==="edit"?" on":"")} onClick={()=>setTab("edit")}>Configure</button>
            <button className={"panel-tab"+(tab==="json"?" on":"")} onClick={()=>setTab("json")}>{Icon.collect} JSON</button>
            <div style={{flex:1}}/>
            {selNode && <button className="btn icon ghost" title="Delete" onClick={()=>delNode(selNode.id)}>{Icon.trash}</button>}
          </div>
          <div className="panel-body">
            {!selNode ? (
              <div className="panel-empty">Select a node on the canvas to configure it,<br/>or use the anchors below a node to branch out.</div>
            ) : tab==="json" ? (
              <JsonDrawer node={selNode} allNodes={nodes} onClose={()=>setTab("edit")} />
            ) : selNode.kind==="group" ? (
              <GroupEditor key={selNode.id} node={selNode}
                onChange={nn=>updateNode(selNode.id,nn)} onDelete={()=>delNode(selNode.id)}
                onAddChild={addChild} onSelect={setSel} />
            ) : (
              <NodeEditor key={selNode.id} node={selNode} allGoalNames={allNames}
                onChange={nn=>updateNode(selNode.id,nn)} onDelete={()=>delNode(selNode.id)}
                onAddChild={addChild} onSelect={setSel} />
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
