<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>AI Script Flow — Node Config Mock</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f6;
    --grid:#e2e6ee;
    --panel:#ffffff;
    --panel-2:#f7f8fb;
    --border:#e3e7ef;
    --border-strong:#cfd6e4;
    --text:#1c2333;
    --text-2:#64708a;
    --muted:#95a0b5;
    --accent:#5b5bf6;
    --accent-soft:#ececff;
    --say:#2e8af6;
    --say-soft:#e6f1ff;
    --ask:#8b5cf6;
    --ask-soft:#f1ebff;
    --green:#1fae62;
    --green-soft:#e4f7ec;
    --amber:#e8920c;
    --amber-soft:#fcf2dd;
    --red:#e5484d;
    --red-soft:#fcebec;
    --radius:12px;
    --shadow:0 1px 2px rgba(20,30,55,.06), 0 6px 22px rgba(20,30,55,.08);
    --shadow-lg:0 12px 50px rgba(20,30,55,.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:Inter,system-ui,-apple-system,sans-serif;
    color:var(--text);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  #root{height:100%}

  /* ---------- App shell ---------- */
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .topbar{
    height:54px;flex:0 0 auto;display:flex;align-items:center;gap:14px;
    padding:0 18px;background:var(--panel);border-bottom:1px solid var(--border);
    z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
  .brand .logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#8b5cf6);
    display:grid;place-items:center;color:#fff}
  .brand small{color:var(--muted);font-weight:500;font-size:12px}
  .topbar .spacer{flex:1}
  .btn{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-strong);
    background:var(--panel);color:var(--text);font:inherit;font-weight:600;font-size:13px;
    padding:8px 13px;border-radius:9px;cursor:pointer;transition:.12s;white-space:nowrap;
  }
  .btn:hover{background:var(--panel-2);border-color:var(--muted)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#4a4ae0}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--panel-2)}
  .btn.sm{padding:5px 9px;font-size:12px;border-radius:8px}
  .btn.icon{padding:7px;border-radius:8px}

  /* ---------- Canvas ---------- */
  .canvas{
    flex:1;min-width:0;overflow:auto;position:relative;
    background-color:var(--bg);
    background-image:radial-gradient(var(--grid) 1.4px, transparent 1.4px);
    background-size:22px 22px;
    padding:40px;
  }
  .canvas-inner{display:flex;flex-wrap:wrap;gap:34px;align-items:flex-start;min-height:100%}

  /* ---------- Node card ---------- */
  .node{
    width:430px;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
    position:relative;
  }
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}

  .node-head{padding:13px 13px 12px}
  .node-head-row{display:flex;align-items:center;gap:9px}

  /* type toggle */
  .typetog{display:inline-flex;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:3px}
  .typetog button{
    border:0;background:transparent;cursor:pointer;font:inherit;font-weight:600;font-size:12px;
    color:var(--text-2);padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;transition:.12s;
  }
  .typetog button.on[data-t="say"]{background:var(--say-soft);color:var(--say)}
  .typetog button.on[data-t="ask"]{background:var(--ask-soft);color:var(--ask)}
  .typetog button.on[data-t="group"]{background:var(--accent-soft);color:var(--accent)}

  .name-in{
    width:100%;border:1px solid transparent;background:transparent;font:inherit;font-weight:700;font-size:17px;
    color:var(--text);padding:7px 9px;border-radius:8px;min-width:0;
  }
  .name-row{margin-top:9px}
  .name-in::placeholder{color:var(--muted);font-weight:600}
  .name-in:hover{background:var(--panel-2)}
  .name-in:focus{outline:none;background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .badges{display:flex;gap:5px;align-items:center}
  .badge{
    display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 7px;border-radius:6px;
    font-size:11px;font-weight:600;background:var(--panel-2);color:var(--text-2);border:1px solid var(--border);
  }
  .badge.amber{background:var(--amber-soft);color:var(--amber);border-color:transparent}
  .badge.green{background:var(--green-soft);color:var(--green);border-color:transparent}
  .badge.accent{background:var(--accent-soft);color:var(--accent);border-color:transparent}

  .cond-pill{
    margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--amber-soft);
    border:1px solid #f0dca8;border-radius:9px;padding:7px 9px;
  }
  .cond-pill svg{color:var(--amber);flex:0 0 auto}
  .cond-pill input{flex:1;border:0;background:transparent;font:inherit;font-size:13px;color:var(--text);
    font-family:'JetBrains Mono',monospace}
  .cond-pill input:focus{outline:none}
  .cond-pill .x{cursor:pointer;color:var(--amber);opacity:.7}
  .cond-pill .x:hover{opacity:1}

  /* ---------- Sections ---------- */
  .section{border-top:1px solid var(--border)}
  .sec-head{
    display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;user-select:none;
  }
  .sec-head:hover{background:var(--panel-2)}
  .sec-chev{transition:.15s;color:var(--muted)}
  .sec-chev.open{transform:rotate(90deg)}
  .sec-icon{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff;flex:0 0 auto}
  .sec-title{font-weight:600;font-size:13.5px;flex:1}
  .sec-count{font-size:11px;font-weight:600;color:var(--text-2);background:var(--panel-2);border:1px solid var(--border);
    border-radius:20px;padding:2px 8px}
  .sec-body{padding:4px 13px 14px}

  /* ---------- Message rows ---------- */
  .msg{
    border:1px solid var(--border);border-radius:10px;background:var(--panel-2);
    margin-bottom:9px;overflow:hidden;
  }
  .msg-cond{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--amber-soft);border-bottom:1px solid #f0dca8}
  .msg-cond svg{color:var(--amber)}
  .msg-cond input{flex:1;border:0;background:transparent;font:inherit;font-size:12px;
    font-family:'JetBrains Mono',monospace;color:var(--text)}
  .msg-cond input:focus{outline:none}
  .msg-cond .x{cursor:pointer;color:var(--amber);opacity:.7}
  .msg-main{display:flex;align-items:flex-start;gap:8px;padding:9px}
  .msg-grip{color:var(--muted);cursor:grab;padding-top:5px}
  .msg-num{font-size:11px;font-weight:700;color:var(--muted);padding-top:6px;min-width:14px}
  .msg-ta{
    flex:1;border:0;background:transparent;resize:none;font:inherit;font-size:13.5px;line-height:1.45;
    color:var(--text);min-height:20px;padding:3px 0;
  }
  .msg-ta:focus{outline:none}
  .msg-ta::placeholder{color:var(--muted)}
  .msg-flags{display:flex;gap:4px;padding:0 9px 9px 31px;flex-wrap:wrap}
  .flag{
    display:inline-flex;align-items:center;gap:4px;height:21px;padding:0 7px;border-radius:6px;
    font-size:10.5px;font-weight:600;border:1px solid transparent;
  }
  .flag.forced{background:var(--red-soft);color:var(--red)}
  .flag.repeat{background:var(--accent-soft);color:var(--accent)}
  .flag.norepeat{background:var(--panel-2);color:var(--text-2);border:1px solid var(--border)}
  .flag.excl{background:#e7f0ff;color:#2e6fdb}
  .flag.explicit{background:var(--green-soft);color:var(--green)}
  .add-row{
    width:100%;display:flex;align-items:center;justify-content:center;gap:7px;
    border:1px dashed var(--border-strong);background:transparent;color:var(--text-2);
    font:inherit;font-weight:600;font-size:12.5px;padding:9px;border-radius:9px;cursor:pointer;transition:.12s;
  }
  .add-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* message type dropdown */
  .msgtype{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--border);background:#fff;
    border-radius:7px;padding:5px 5px;cursor:pointer;color:var(--text-2);flex:0 0 auto}
  .msgtype:hover{border-color:var(--accent);color:var(--accent)}
  .msgtype.prompt{background:var(--ask-soft);color:var(--ask);border-color:transparent}
  .msgtype .caret{opacity:.6}

  /* tooltip info dot */
  .tip{display:inline-grid;place-items:center;width:14px;height:14px;color:var(--muted);cursor:help;flex:0 0 auto}
  .tip:hover{color:var(--accent)}
  .ttw{display:inline-flex;align-items:center;vertical-align:middle}
  .ttw.block{display:block}
  .tooltip{
    background:#1c2333;color:#fff;font-family:Inter,sans-serif;font-size:11.5px;font-weight:500;
    padding:7px 10px;border-radius:8px;box-shadow:0 8px 26px rgba(0,0,0,.32);max-width:340px;
    white-space:pre-wrap;z-index:300;pointer-events:none;line-height:1.5;
  }
  .tooltip.mono{font-family:'JetBrains Mono',monospace;font-size:11px;background:#0d1326;color:#cdd6f4}
  .tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:#1c2333}
  .tooltip.mono::after{border-top-color:#0d1326}

  /* JSON drawer */
  .workspace{flex:1;display:flex;min-height:0;overflow:hidden}
  .drawer{flex:0 0 440px;width:440px;background:#0d1326;
    box-shadow:-12px 0 50px rgba(0,0,0,.30);display:flex;flex-direction:column;min-height:0}
  .drawer-head{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid #20283f;flex:0 0 auto}
  .drawer-head .dt{font-weight:700;font-size:14px;color:#fff}
  .drawer-head .gname{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#7c89b5}
  .drawer-tabs{display:flex;gap:6px;padding:10px 15px 0;flex:0 0 auto}
  .drawer-tab{border:1px solid #2a3350;background:#141b30;color:#9aa6c9;font:inherit;font-weight:600;font-size:12px;
    padding:5px 11px;border-radius:7px;cursor:pointer}
  .drawer-tab.on{background:#5b5bf6;border-color:#5b5bf6;color:#fff}
  .drawer pre{margin:0;padding:15px;overflow:auto;flex:1;font-family:'JetBrains Mono',monospace;
    font-size:12px;line-height:1.65;white-space:pre;color:#cdd6f4}
  .drawer .jkey{color:#82aaff}
  .drawer .jstr{color:#c3e88d}
  .drawer .jnum{color:#f78c6c}
  .drawer .jbool{color:#c792ea}
  .drawer-btn{border:1px solid #2a3350;background:#161d34;color:#cdd6f4;font:inherit;font-weight:600;font-size:12px;
    padding:6px 11px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .drawer-btn:hover{background:#1d2542}

  /* ---------- Canvas graph ---------- */
  .canvas-sizer{position:relative}
  .canvas-stage{position:absolute;top:0;left:0;width:4000px;height:2600px;transform-origin:0 0}
  .edges{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
  /* zoom control */
  .zoombar{position:absolute;left:14px;bottom:14px;display:flex;align-items:center;gap:2px;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);padding:3px;z-index:5}
  .zoombar button{border:0;background:transparent;cursor:pointer;color:var(--text-2);width:28px;height:28px;border-radius:7px;
    display:grid;place-items:center;font-size:16px;font-weight:600}
  .zoombar button:hover{background:var(--panel-2);color:var(--text)}
  .zoombar .zval{font-size:12px;font-weight:600;color:var(--text-2);min-width:42px;text-align:center;cursor:pointer}
  .edge{fill:none;stroke:var(--border-strong);stroke-width:2}
  .edge.choice{stroke:var(--say)}
  .edge.trans{stroke:var(--amber)}
  .edge-label{position:absolute;transform:translate(-50%,-50%);font-size:10.5px;font-weight:600;
    background:#fff;border:1px solid var(--border);border-radius:20px;padding:2px 8px;white-space:nowrap;
    color:var(--text-2);pointer-events:none}
  .edge-label.choice{color:var(--say);border-color:#bcd9fb}
  .edge-label.trans{color:var(--amber);border-color:#f0dca8}

  .cnode{position:absolute;width:230px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;box-shadow:var(--shadow);user-select:none}
  .cnode.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}
  .cn-head{display:flex;align-items:center;gap:8px;padding:10px 11px 8px;cursor:grab}
  .cn-head:active{cursor:grabbing}
  .cn-ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
  .cn-ic.say{background:var(--say-soft);color:var(--say)}
  .cn-ic.ask{background:var(--ask-soft);color:var(--ask)}
  .cn-name{font-weight:700;font-size:13.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cn-name.empty{color:var(--muted);font-weight:600}
  .cn-msg{padding:0 11px 11px;font-size:12px;color:var(--text-2);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cn-msg .genmark{color:var(--ask);font-weight:700}
  .cn-msg.empty{color:var(--muted);font-style:italic}
  /* connection ports: choice & transition anchors stacked bottom-right, circle on the right edge */
  .cn-ports{padding:6px 0 2px}
  .cn-port{position:relative;display:flex;align-items:center;justify-content:flex-end;gap:7px;
    padding:4px 17px 4px 12px;cursor:pointer}
  .cn-port .plabel{font-size:11px;font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cn-port.choice .plabel{color:var(--say)}
  .cn-port.trans .plabel{color:var(--amber)}
  .pcircle{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--border-strong);box-sizing:border-box}
  .cn-port .pcircle{position:absolute;right:-7px;top:50%;transform:translateY(-50%);transition:box-shadow .12s}
  .cn-port.choice .pcircle{border-color:var(--say)}
  .cn-port.trans .pcircle{border-color:var(--amber)}
  .cn-port:hover .pcircle{box-shadow:0 0 0 4px var(--accent-soft)}
  .cn-port:hover .plabel{text-decoration:underline}
  /* the renamed 'Add' anchor: centered at bottom, circle on the bottom edge */
  .cn-add{position:relative;border-top:1px solid var(--border);display:flex;justify-content:center;padding:9px}
  .cn-add-btn{display:inline-flex;align-items:center;gap:5px;border:1px dashed var(--border-strong);
    background:var(--panel-2);border-radius:20px;padding:4px 14px;font-size:11.5px;font-weight:600;color:var(--text-2);cursor:pointer}
  .cn-add:hover .cn-add-btn{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .cn-add .pcircle{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border-color:var(--accent);transition:box-shadow .12s}
  .cn-add:not(.connected):hover .pcircle{box-shadow:0 0 0 4px var(--accent-soft)}
  .cn-add.connected{padding:7px;border-top:0}   /* sequence child exists: keep only the connection circle */

  /* ---------- Right options panel ---------- */
  .panel{flex:0 0 470px;max-width:52vw;border-left:1px solid var(--border);background:var(--panel);
    display:flex;flex-direction:column;min-height:0}
  .panel-tabs{display:flex;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .panel-tab{border:1px solid var(--border-strong);background:var(--panel);color:var(--text-2);font:inherit;
    font-weight:600;font-size:12.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
  .panel-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .panel-body{flex:1;overflow:auto;min-height:0}
  .panel .drawer{flex:1;width:auto;box-shadow:none}
  .panel-empty{display:grid;place-items:center;height:100%;color:var(--muted);font-size:13px;text-align:center;padding:30px}
  .node-editor{}

  /* ---------- Group container goals ---------- */
  .group-min{position:absolute;width:214px;border:2px dashed var(--border-strong);border-radius:14px;
    background:#f4f4fd;box-shadow:var(--shadow);padding:8px;display:flex;flex-direction:column;gap:7px;user-select:none}
  .group-min.sel{border-color:var(--accent);background:var(--accent-soft)}
  .group-min-head{display:flex;align-items:center;gap:8px;cursor:grab;padding:2px 3px}
  .group-min-head:active{cursor:grabbing}
  .group-min-head .gname{flex:1;min-width:0;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .group-min-head .gname.empty{color:var(--muted)}
  .group-min-head .gcount{font-size:11px;font-weight:600;color:var(--accent);background:#fff;border-radius:20px;padding:1px 8px;border:1px solid var(--border)}
  .group-min-children{display:flex;flex-direction:column;gap:5px;padding-left:2px}
  .group-min-child{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:4px 11px;font-size:11.5px;font-weight:600;color:var(--text-2);cursor:pointer;align-self:flex-start;max-width:100%}
  .group-min-child .ic{display:inline-flex;color:var(--muted)}
  .group-min-child .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .group-min-child:hover{border-color:var(--accent);color:var(--accent)}
  .group-min-child.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .group-min-child.sel .ic{color:var(--accent)}
  .group-ic{width:24px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:0 0 auto}

  .group{position:absolute;width:286px;border:2px dashed var(--border-strong);border-radius:14px;
    background:#f4f4fd;box-shadow:var(--shadow);user-select:none}
  .group.sel{border-color:var(--accent);background:var(--accent-soft)}
  .group-head{display:flex;align-items:center;gap:8px;padding:10px 10px 6px;cursor:grab}
  .group-head:active{cursor:grabbing}
  .group-name{flex:1;min-width:0;font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .group-name.empty{color:var(--muted);font-weight:600}
  .group-cond{margin:0 10px 8px;display:flex;align-items:center;gap:7px;background:var(--amber-soft);border:1px solid #f0dca8;border-radius:8px;padding:5px 8px;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:var(--amber)}
  .group-add{display:flex;justify-content:center;padding:2px 10px 9px;position:relative}
  .group-add .pcircle{position:absolute;top:-9px;left:50%;transform:translateX(-50%);border-color:var(--accent)}
  .group-add-btn{display:inline-flex;align-items:center;gap:5px;border:1px dashed var(--border-strong);background:#fff;
    border-radius:20px;padding:5px 14px;font-size:11.5px;font-weight:600;color:var(--text-2);cursor:pointer}
  .group-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .group-body{display:flex;flex-direction:column;gap:8px;padding:0 10px 10px}
  .group-empty{color:var(--muted);font-size:12px;text-align:center;padding:4px 0 8px}
  .group-fulfill{font-size:10.5px;font-weight:600;color:var(--green);background:var(--green-soft);border-radius:6px;padding:2px 7px}
  .cnode.nested{position:static;width:auto;box-shadow:none;border-color:var(--border)}
  .cnode.nested.sel{border-color:var(--accent)}
  /* in-card child goals (a goal acting as a container) — fills the card width */
  .cn-children{margin:0;border-top:1px dashed var(--border-strong);background:#f4f4fd;padding:8px 11px;display:flex;flex-direction:column;gap:5px;align-items:flex-start}
  .cn-children-empty{color:var(--muted);font-size:11.5px;text-align:center;padding:3px;align-self:stretch}
  .cn-children-add{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1px dashed var(--border-strong);

/* ============================= TOOLTIPS ============================= */
function Tooltip({label, mono=false, children, block=false}){
  const [show,setShow]=useState(false);
  const [pos,setPos]=useState(null);
  const ref=useRef();
  const enter=()=>{ const r=ref.current.getBoundingClientRect(); setPos({x:r.left+r.width/2, y:r.top}); setShow(true); };
  if(!label) return children;
  return (
    <span ref={ref} className={"ttw"+(block?" block":"")} onMouseEnter={enter} onMouseLeave={()=>setShow(false)}>
      {children}
      {show&&pos&&(
        <span className={"tooltip"+(mono?" mono":"")}
          style={{position:"fixed", left:pos.x, top:pos.y-9, transform:"translate(-50%,-100%)"}}>{label}</span>
      )}
    </span>
  );
}
function InfoDot({text, mono=false}){
  return <Tooltip label={text} mono={mono}><span className="tip">{Icon.info}</span></Tooltip>;
}
/* label row: text + (?) human description.  json -> code tooltip wrapping the control. */

      {json ? <Tooltip label={json} mono block>{children}</Tooltip> : children}

  );
}

  triggers:{enabled:false, positive:[], negative:[]},
  objection:{enabled:false, attempts:2, condition:"", messages:[]},
  refusal:{enabled:false, items:[]},
  messages:[newMessage()],
  value:{type:"approval", validation:"", unitType:"any", range:false, rangeMin:"", rangeMax:"", tense:"any",
         choices:[newChoice("yes"), newChoice("no")], passive:true},
  tools:[],
  transitions:[],
  childGoals:false, children:[],
  open:{messages:true, value:true, triggers:true, objection:true, refusal:true, tools:true, transitions:true, children:true},
});
const newTransition = () => ({id:uid(), name:"", target:"", prompt:"", conditions:"", properties:[], assigned:[]});
// Group container goal: no type/messages — only name, conditions, fulfillment (tools) and sub-goals.
const newGroup = () => ({id:uid(), kind:"group", name:"", x:80, y:60, edgeFrom:null,
  condition:null, minimized:true, choiceOf:null, triggers:{enabled:false, positive:[], negative:[]}, tools:[], children:[]});

// convert a node between say / ask / group, preserving shared fields (name, position, children, tools…)
function convertNode(node, target){
  const keep = {id:node.id, x:node.x, y:node.y, edgeFrom:node.edgeFrom, name:node.name,
    condition:node.condition ?? null, tools:node.tools||[], children:node.children||[],
    triggers:node.triggers||{enabled:false,positive:[],negative:[]}};
  if(target==="group"){
    if(node.kind==="group") return node;
    return {...newGroup(), ...keep, minimized:false, choiceOf:node.choiceOf||null};
  }
  // -> goal (say/ask)
  const base = newNode(target);
  return {...base, ...keep, type:target, childGoals:(node.children&&node.children.length>0)||node.childGoals||false};
}

/* recursively walk the node tree — any node may carry a `children` array */
const kids = n => (n.children && n.children.length) ? n.children : null;
function mapNodeTree(nodes, id, fn){
  return nodes.map(n=>{
    if(n.id===id) return fn(n);
    if(kids(n)) return {...n, children:mapNodeTree(n.children, id, fn)};
    return n;
  });
}
function removeNodeTree(nodes, id){
  return nodes.filter(n=>n.id!==id).map(n=> kids(n) ? {...n, children:removeNodeTree(n.children, id)} : n);
}
function findNodeTree(nodes, id){
  for(const n of nodes){
    if(n.id===id) return n;
    if(kids(n)){ const f=findNodeTree(n.children, id); if(f) return f; }
  }
  return null;
}
function allNodeNames(nodes){
  const out=[];
  nodes.forEach(n=>{ if(n.name) out.push(n.name); if(kids(n)) out.push(...allNodeNames(n.children)); });
  return out;
}

/* ============================= MENU ============================= */
function Menu({trigger, children, align="right", minW=208}){
  const [open,setOpen]=useState(false);
  const [pos,setPos]=useState(null);
  const wrapRef=useRef();
  const menuRef=useRef();
  const toggle=()=>{
    if(open){ setOpen(false); return; }
    const r=wrapRef.current.getBoundingClientRect();
    setPos({top:r.bottom+6, right:window.innerWidth-r.right, left:r.left});
    setOpen(true);
  };
  useEffect(()=>{
    if(!open) return;
    const h=e=>{ if(menuRef.current && !menuRef.current.contains(e.target) &&
                     wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    const close=()=>setOpen(false);
    document.addEventListener("mousedown",h);
    window.addEventListener("scroll",close,true);
    window.addEventListener("resize",close);
    return ()=>{ document.removeEventListener("mousedown",h);
      window.removeEventListener("scroll",close,true); window.removeEventListener("resize",close); };
  },[open]);
  const style = open&&pos ? {position:"fixed", top:pos.top, minWidth:minW,
    ...(align==="left"?{left:pos.left}:{right:pos.right})} : null;
  return (
    <div className="menu-wrap" ref={wrapRef}>
      <div onClick={toggle}>{trigger}</div>
      {open && <div className="menu" ref={menuRef} style={style}>
        {typeof children==="function"?children(()=>setOpen(false)):children}
      </div>}
    </div>
  );
}
